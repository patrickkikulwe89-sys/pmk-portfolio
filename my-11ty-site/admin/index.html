<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PMK Portfolio Content Manager</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "patrickkikulwe89-sys/pmk-portfolio",
            branch: "main"
          },
          media_folder: "images",
          public_folder: "/images",
          collections: [
            {
              name: "pages",
              label: "Website Pages",
              files: [
                {
                  label: "Home Page", name: "home", file: "index.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Hobbies Page", name: "hobbies", file: "hobbies.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Beliefs Page", name: "beliefs", file: "beliefs.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Marriage Page", name: "marriage", file: "marriage.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Work Page", name: "work", file: "work.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Education Page", name: "education", file: "education.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                },
                {
                  label: "Stories Page", name: "stories", file: "stories.md",
                  fields: [
                    {label: "Layout", name: "layout", widget: "hidden", default: "base.njk"},
                    {label: "Page Title", name: "title", widget: "string"},
                    {label: "Page Content", name: "body", widget: "markdown"}
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
